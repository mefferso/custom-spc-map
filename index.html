<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Custom Mesoanalysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This keeps all selected layers perfectly stacked on top of each other */
        .map-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            mix-blend-mode: screen; /* Helps blend dark layers seamlessly */
        }
    </style>
</head>
<body class="bg-gray-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-xl font-bold text-amber-400 tracking-wide">Mesoanalysis Dashboard</h1>
            <p class="text-xs text-slate-400">Sector 15 • Pixel-Perfect Stacking</p>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-gray-900 border-r border-gray-800 p-6 space-y-6 overflow-y-auto">
            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Base & Radar</h2>
                <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                    <input type="checkbox" id="toggle-rdr" checked class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                    <span>Live Radar Loop (RDR)</span>
                </label>
            </div>

            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Thermodynamics</h2>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                        <input type="checkbox" id="toggle-sbcp" checked class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                        <span>Surface CAPE (SBCP)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                        <input type="checkbox" id="toggle-mlcp" class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                        <span>Mixed-Layer CAPE (MLCP)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                        <input type="checkbox" id="toggle-dcape" class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                        <span>Downdraft CAPE (DCAPE)</span>
                    </label>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Wind Shear & Kinematics</h2>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                        <input type="checkbox" id="toggle-eshr" class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                        <span>Effective Bulk Shear (ESHR)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 rounded hover:bg-gray-800 cursor-pointer">
                        <input type="checkbox" id="toggle-stpc" class="rounded bg-gray-700 border-gray-600 text-amber-500 focus:ring-amber-500">
                        <span>Sig Tornado Parameter (STPC)</span>
                    </label>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-gray-950 p-6 flex items-center justify-center overflow-auto">
            <div class="relative w-full max-w-4xl aspect-[4/3] bg-black shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                
                <img id="layer-rdr" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/rdr/rdr.gif" class="map-layer z-10">
                
                <img id="layer-sbcp" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/sbcp/sbcp.gif" class="map-layer z-20 opacity-80">
                <img id="layer-mlcp" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/mlcp/mlcp.gif" class="map-layer z-20 opacity-80 hidden">
                <img id="layer-dcape" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/dcape/dcape.gif" class="map-layer z-20 opacity-80 hidden">
                <img id="layer-eshr" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/eshr/eshr.gif" class="map-layer z-30 opacity-75 hidden">
                <img id="layer-stpc" src="https://www.spc.noaa.gov/exper/mesoanalysis/s15/stpc/stpc.gif" class="map-layer z-40 opacity-85 hidden">
                
            </div>
        </main>
    </div>

    <script>
        function setupToggle(checkboxId, layerId) {
            const checkbox = document.getElementById(checkboxId);
            const layer = document.getElementById(layerId);
            
            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    layer.classList.remove('hidden');
                } else {
                    layer.classList.add('hidden');
                }
            });
        }

        // Link the checkboxes to the image layers
        setupToggle('toggle-rdr', 'layer-rdr');
        setupToggle('toggle-sbcp', 'layer-sbcp');
        setupToggle('toggle-mlcp', 'layer-mlcp');
        setupToggle('toggle-dcape', 'layer-dcape');
        setupToggle('toggle-eshr', 'layer-eshr');
        setupToggle('toggle-stpc', 'layer-stpc');
    </script>
</body>
</html>
